services:
  web:
    build: ./api
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - CONNECTION_STRING=${CONNECTION_STRING_DOCKER}
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    command: [ "java", "-jar", "/app/todoist-api-1.0.0.jar" ]

  db:
    image: postgres:18.1
    container_name: postgres_todoist
    environment:
      PGUSER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d ${DB_NAME} -U ${DB_USER}" ]
      interval: 1s
      timeout: 5s
      retries: 10
    volumes:
      - dev-data:/var/lib/postgresql

  redis:
    image: redis:8.4
    container_name: redis_todoist

volumes:
  dev-data:
